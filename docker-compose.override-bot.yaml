services:
  opencode:
    command: ["opencode", "serve", "--hostname", "0.0.0.0", "--port", "4096"]
    depends_on:
      telegram-bot:
        condition: service_healthy
    extra_hosts:
      - "app.opencode.ai:0.0.0.0"
      - "api.opencode.ai:0.0.0.0"
      - "opncd.ai:0.0.0.0"
      - "models.dev:0.0.0.0"

  telegram-bot:
    build:
      context: ./sidecars/telegram-bot
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    volumes:
      - bot-cron-data:/opt/bot
    environment:
      OPENCODE_API_URL: http://opencode:4096
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8765)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - opencode-net
    restart: unless-stopped

volumes:
  bot-cron-data:
    driver: local
