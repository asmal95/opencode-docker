services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
      target: opencode-base
      args:
        OPENCODE_BUILD_TIME: "${OPENCODE_BUILD_TIME:-0}"
    image: opencode-platform:latest
    command: ["opencode", "serve", "--log-level", "DEBUG", "--hostname", "0.0.0.0", "--port", "4096"]
    ports:
      - "4096:4096"
    environment:
      OPENCODE_CONFIG: /opt/opencode-config/opencode.jsonc
      OPENCODE_DISABLE_AUTOUPDATE: "true"
      OPENCODE_DISABLE_MODELS_FETCH: "true"
      OPENCODE_DISABLE_SHARE: "true"
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - opencode-data:/home/coder/.local/share/opencode
      - opencode-cache:/home/coder/.cache/opencode
      - opencode-state:/home/coder/.local/state
      - ./configs/${SCENARIO:-bot}:/opt/opencode-config/:ro
      - ${PROJECT_DIR:-.}:/workspace
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    extra_hosts:
      - "app.opencode.ai:0.0.0.0"
      - "api.opencode.ai:0.0.0.0"
      - "opncd.ai:0.0.0.0"
      - "models.dev:0.0.0.0"
    networks:
      - opencode-net
    stdin_open: true
    tty: true
    working_dir: /workspace
    restart: unless-stopped

volumes:
  opencode-data:
    driver: local
  opencode-cache:
    driver: local
  opencode-state:
    driver: local

networks:
  opencode-net:
    driver: bridge
