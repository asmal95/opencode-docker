services:
  opencode:
    image: asmal95/opencode-platform:latest
    command: ["opencode", "serve", "--print-logs", "--log-level", "DEBUG", "--hostname", "0.0.0.0", "--port", "4096"]
    ports:
      - "4096:4096"
    environment:
      OPENCODE_CONFIG: /opt/opencode-config/opencode.jsonc
      OPENCODE_DISABLE_AUTOUPDATE: "true"
      OPENCODE_DISABLE_MODELS_FETCH: "true"
      OPENCODE_DISABLE_SHARE: "true"
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
    volumes:
      - opencode-data:/home/coder/.local/share/opencode
      - opencode-cache:/home/coder/.cache/opencode
      - opencode-state:/home/coder/.local/state
      - ./configs/bot:/opt/opencode-config:ro
      - opencode-workspace:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "app.opencode.ai:0.0.0.0"
      - "api.opencode.ai:0.0.0.0"
      - "opncd.ai:0.0.0.0"
      - "models.dev:0.0.0.0"
    read_only: true
    tmpfs:
      - /tmp
      - /home/coder/.config/opencode
      - /home/coder/.local/state
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    restart: unless-stopped
    networks:
      - opencode-net

  telegram-bot:
    image: asmal95/telegram-bot:latest
    depends_on:
      - opencode
    ports:
      - "8765:8765"
    volumes:
      - bot-cron-data:/opt/bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENCODE_API_URL: http://opencode:4096
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - opencode-net

volumes:
  opencode-data:
    driver: local
  opencode-cache:
    driver: local
  opencode-state:
    driver: local
  opencode-workspace:
    driver: local
  bot-cron-data:
    driver: local

networks:
  opencode-net:
    driver: bridge
